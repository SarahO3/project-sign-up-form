<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- left side with background image -->
  <aside class="sidebar">

    <!-- logo bar -->
    <div class="logo-box">
      <img src="./odin-lined.png" alt="odin logo">
      <span>ODIN</span>
    </div>

    <!-- image credit -->
    <p class="credit">Photo by Halie West on Unsplash</p>

  </aside>

  <!-- right side -->
  <main class="main">

    <!-- intro text -->
    <section class="intro">
      <p>
        This is not a real online service! You know you need something like this
        in your life to help you realize your deepest dreams.
      </p>
      <p><strong>Sign up now</strong> to get started.</p>
      <p>You know you want to.</p>
    </section>

    <!-- form starts -->
    <form>

      <!-- form card -->
      <section class="form-box">
        <h2>Let's do this!</h2>

        <!-- grid -->
        <div class="form-grid">

          <label class="form-group">
            FIRST NAME
            <input type="text" placeholder="Thor">
          </label>

          <label class="form-group">
            LAST NAME
            <input type="text" placeholder="Odinson">
          </label>

          <label class="form-group">
            EMAIL
            <input type="email">
          </label>

          <label class="form-group">
            PHONE NUMBER
            <input type="tel">
          </label>

          <label class="form-group">
            PASSWORD
            <input type="password" required>
          </label>

          <label class="form-group">
            CONFIRM PASSWORD
            <input type="password" required>
          </label>

        </div>
      </section>

      <!-- button section -->
      <section class="bottom">
        <button type="submit">Create Account</button>
        <p>Already have an account? <span>Log in</span></p>
      </section>

    </form>

  </main>

</div>

</body>
</html>
